<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SH Corp | Partner Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-2xl font-extrabold text-blue-600 tracking-tight">SH Corp</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="text-sm font-medium text-blue-600 hover:text-blue-800 transition">
                        Provider Login
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative bg-blue-900 overflow-hidden py-20 text-center">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <h1 class="text-4xl font-extrabold text-white sm:text-5xl mb-6">Grow Your Business with SH Corp</h1>
            <p class="mt-3 max-w-2xl mx-auto text-xl text-blue-200">List your property, reach millions, and manage bookings seamlessly.</p>
        </div>
    </main>

    <section id="apply" class="py-20 bg-white">
        <div class="max-w-2xl mx-auto px-4">
            <div class="bg-blue-50 rounded-2xl p-8 shadow-inner border border-blue-100">
                <h2 class="text-2xl font-bold text-center text-slate-900 mb-6">Start Your Onboarding</h2>
                
                <form id="applyForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-700">First Name</label>
                            <input type="text" id="firstName" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Last Name</label>
                            <input type="text" id="lastName" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Property Name</label>
                        <input type="text" id="propertyName" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">Business Email</label>
                        <input type="email" id="email" class="mt-1 block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border" required>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-blue-600 hover:bg-blue-700 transition">
                        Apply Now
                    </button>
                </form>
                <div id="statusMessage" class="mt-4 text-center font-medium hidden"></div>
            </div>
        </div>
    </section>

    <script>
        const form = document.getElementById('applyForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 로딩 상태 표시
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;
            statusMessage.classList.add('hidden');

            const payload = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                propertyName: document.getElementById('propertyName').value,
                email: document.getElementById('email').value
            };

            try {
                // 주의: 로컬 테스트 시 http://localhost:3000 사용. 
                // 운영 환경(Cloud) 배포 시 해당 백엔드 도메인으로 변경해야 합니다.
                const BACKEND_URL = '/api/trigger-onboarding';

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusMessage.innerText = "Application submitted successfully! Please check your email.";
                    statusMessage.className = "mt-4 text-center font-medium text-green-600";
                    form.reset();
                } else {
                    throw new Error("Server error");
                }
            } catch (error) {
                statusMessage.innerText = "There was an error processing your application.";
                statusMessage.className = "mt-4 text-center font-medium text-red-600";
            } finally {
                submitBtn.innerText = "Apply Now";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
